        url: json-schema/heidi-health-clinical-code-schema.json
      - type: Examples
        url: examples/heidi-health-get-clinical-codes-example.json
  - aid: heidi-health:heidi-api-transcription
    name: Heidi Transcription API
    description: >-
      Submit consultation audio either as a single uploaded file (lazy transcription on next GET) or in 45-second to
      1-minute chunks for live ambient capture, and retrieve either the finalised transcript or a live chunked
      transcript stream with per-chunk status and source provenance.
    humanURL: https://www.heidihealth.com/developers/heidi-api/transcription
    tags:
      - Transcription
      - Audio
      - Speech To Text
      - Streaming
      - Ambient AI
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/transcription
      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
      - type: JSONSchema
        url: json-schema/heidi-health-transcript-schema.json
  - aid: heidi-health:heidi-api-consult-notes
    name: Heidi Consult Notes API
    description: >-
      Generate streamed consult notes from a session's transcript and context, using either a Heidi or organisation
      template or a custom client-supplied JSON template, with voice-style controls
      (Goldilocks/Detailed/Brief/Super-Detailed/My Voice), brain selection (Left/Right), and Markdown or HTML output.
    humanURL: https://www.heidihealth.com/developers/heidi-api/consult-notes
    tags:
      - Consult Notes
      - Generation
      - Templates
      - Streaming
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/consult-notes
      - type: OpenAPI
