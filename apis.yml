      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
  - aid: heidi-health:heidi-widget-sdk
    name: Heidi Widget SDK
    description: >-
      Embeddable JavaScript widget for dropping Heidi's ambient documentation experience directly into a web-based EHR
      or clinical workflow with minimal engineering, with documented initialisation options, methods/callbacks,
