aid: heidi-health
name: Heidi Health
description: >-
  Heidi Health is a Melbourne, Australia-founded AI care partner for clinicians, founded in 2019 by Dr. Tom Kelly (CEO),
  Waleed Mussa (CFO), and Yu Liu (CTO). The product began as an ambient AI medical scribe and now spans four capability
  surfaces: Scribe (real-time clinical documentation from audio), Evidence (clinical decision support and literature
  lookup with citations), Remote (a 21-gram wearable microphone with on-device encryption for offline ambient capture),
  and Comms (clinical communications). The platform is used by more than one million clinicians across 50+ countries
  spanning family medicine, specialists, nursing, mental health, allied health, dentistry, veterinary medicine, and
  trainees, and claims to have returned over 18 million hours of clinician time to date. Heidi exposes a public Heidi
  API and embeddable Heidi Widget that EHR vendors, telehealth platforms, and partners use to embed ambient
  documentation into their own workflows; documented integrations include Epic (Hyperspace/Hyperdrive/Haiku), Oracle
  Cerner (PowerChart/FirstNet), Athenahealth, eClinicalWorks (via Vim), Best Practice, Medical Director, Gentu, Cliniko,
  Halaxy, MediRecords, and many others. Heidi holds SOC 2, ISO 27001, ISO 42001, HIPAA, GDPR, APP, PIPEDA, NHS, Cyber
  Essentials+, UKCA, and Swiss FDPA attestations, has raised approximately $80M across Seed, Series A (Blackbird), and a
  $65M Series B led by Point72 Private Investments with Blackbird, Headline, and Latitude, and recently announced a
  strategic partnership with R1 RCM to embed Heidi into US revenue cycle management workflows.
tags:
