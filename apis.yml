      - type: JSONSchema
        url: json-schema/heidi-health-consult-note-schema.json
      - type: Examples
        url: examples/heidi-health-generate-consult-note-example.json
  - aid: heidi-health:heidi-api-documents
    name: Heidi Documents API
    description: >-
      Create and retrieve auxiliary template-driven documents associated with a session (referral letters, patient
      handouts, billing summaries, etc.) using the same voice-style, brain, and content-type controls as consult notes.
    humanURL: https://www.heidihealth.com/developers/heidi-api/documents
    tags:
