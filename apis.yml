apis:
  - aid: heidi-health:heidi-api-authentication
    name: Heidi Authentication API
    description: >-
      Exchange a tenant-scoped Heidi API key for a short-lived bearer JWT bound to an EHR user (identified by email plus
      third-party internal ID). The token is returned with its ISO 8601 expiration_time and used in the Authorization
      header on every subsequent Heidi API call.
    humanURL: https://www.heidihealth.com/developers/heidi-api/authentication
    tags:
      - Authentication
      - Authorization
      - JWT
      - API Keys
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/authentication
      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
      - type: Examples
        url: examples/heidi-health-get-jwt-example.json
  - aid: heidi-health:heidi-api-templates
    name: Heidi Templates API
    description: >-
      List consult-note templates available to the authenticated API user, including Heidi-authored templates,
      organisation-shared templates, and private clinician templates, with their structure, category, HTML rendering,
      and authoring metadata.
    humanURL: https://www.heidihealth.com/developers/heidi-api/templates
    tags:
      - Templates
      - Consult Notes
      - Documentation
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/templates
      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
  - aid: heidi-health:heidi-api-patient-profiles
    name: Heidi Patient Profiles API
    description: >-
      Manage longitudinal patient profiles independent of any single session, including create, update, list, retrieve,
      batch-delete, and link-sessions operations. Profiles can carry EHR patient identifiers and provider context so
      sessions inherit patient history.
    humanURL: https://www.heidihealth.com/developers/heidi-api/patient-profiles
    tags:
      - Patients
      - Patient Profiles
      - EHR
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/patient-profiles
      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
      - type: JSONSchema
        url: json-schema/heidi-health-patient-profile-schema.json
  - aid: heidi-health:heidi-api-sessions
    name: Heidi Sessions API
    description: >-
      Create, update, retrieve, and list clinical sessions — the central object that ties together transcription,
      consult notes, documents, clinician notes, language settings, EHR identifiers, consent state, and linked context
      sessions.
    humanURL: https://www.heidihealth.com/developers/heidi-api/sessions/overview
    tags:
      - Sessions
      - Clinical Encounters
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/sessions/overview
      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
      - type: JSONSchema
        url: json-schema/heidi-health-session-schema.json
      - type: JSONStructure
        url: json-structure/heidi-health-session-structure.json
      - type: Examples
        url: examples/heidi-health-create-session-example.json
  - aid: heidi-health:heidi-api-session-context
    name: Heidi Session Context API
    description: >-
      Attach contextual material to a session — free-text or Markdown clinician notes, links to prior patient sessions,
      and uploaded context documents (PDF, JPG, PNG, DOCX, DOC) — so Heidi's generation grounds the consult note in the
      relevant patient background.
    humanURL: https://www.heidihealth.com/developers/heidi-api/sessions/context
    tags:
      - Sessions
      - Context
      - Attachments
      - Documents
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/sessions/context
      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
  - aid: heidi-health:heidi-api-session-coding
    name: Heidi Session Coding API
    description: >-
      Generate clinical codes for a session across ICD-10, ICD-10-CM, ICD-9, ICD-9-CM, SNOMED, SNOMED-CT, OPCS-410,
      ACHI-13, and CPT-2025, returning a primary code, similar candidate codes, and citation references back to the
      transcript and consult-note text.
    humanURL: https://www.heidihealth.com/developers/heidi-api/sessions/coding
    tags:
      - Clinical Coding
      - ICD-10
      - SNOMED
      - CPT
      - Billing
    properties:
      - type: Documentation
        url: https://www.heidihealth.com/developers/heidi-api/sessions/coding
      - type: OpenAPI
        url: openapi/heidi-health-openapi.yml
