aid: heidi-health
name: Heidi Health Vocabulary
description: >-
  Operational vocabulary mapping for Heidi Health, covering the domain
  concepts, capability surfaces, content controls, coding standards, and
  compliance frameworks that recur across the Heidi API, the Heidi Widget,
  and Heidi's product surface (Scribe, Evidence, Remote, Comms).
created: '2026-05-24'
modified: '2026-05-24'
dimensions:
  - id: capability
    label: Capability Surface
    values:
      - id: scribe
        label: Heidi Scribe
        description: Ambient AI medical scribe — transcript and consult-note generation.
      - id: evidence
        label: Heidi Evidence
        description: Clinical decision support with literature citations and CPD/CME tracking.
      - id: remote
        label: Heidi Remote
        description: 21-gram wearable microphone with offline capture and on-device encryption.
      - id: comms
        label: Heidi Comms
        description: Clinical communications module.
      - id: heidi-api
        label: Heidi API
        description: Public REST API at registrar.api.heidihealth.com.
      - id: heidi-widget
        label: Heidi Widget
        description: Embeddable JavaScript widget for web-based EHRs.

